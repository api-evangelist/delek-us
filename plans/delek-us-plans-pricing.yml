description: 'Delek US is an alias entry for Delek US Holdings, Inc. (NYSE: DK). The company does
  not publish a developer API, sandbox, or pricing tier — partner integrations occur through
  industry-standard EDI, terminal automation, and ticketing systems negotiated bilaterally with
  trading and logistics counterparties. There is no consumer-facing API plan to price.'
sources:
