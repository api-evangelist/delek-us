aid: delek-us
name: Delek US
description: >-
  Delek US is an alias for Delek US Holdings, Inc. (NYSE: DK), a
  diversified downstream energy company headquartered in Brentwood,
  Tennessee with assets in petroleum refining, logistics, asphalt
  operations, renewable fuels, and convenience store retailing. Delek
  operates four refineries in Tyler and Big Spring (Texas), El Dorado
  (Arkansas), and Krotz Springs (Louisiana) with combined crude
  throughput capacity of roughly 302,000 barrels per day. The canonical
  profile for this company is maintained under aid delek-us-holdings;
  this entry exists as a name alias and references the corporate site.
  Delek does not publish a developer API; partner integrations occur
  through industry-standard EDI, terminal automation, and ticketing
  systems.
