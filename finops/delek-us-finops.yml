meters:
  - name: bilateral_integrations
    description: Active partner integrations (EDI feeds, terminal-automation links, ticketing
      bridges).
    unit: integration
    aggregation: max
    dimensions:
      - partner
      - integration_type
principles:
  - name: Visibility
    description: There is no API invoice. Track partner-integration spend through procurement and
      logistics contracts rather than developer-portal usage.
  - name: Allocation
    description: Allocate any integration-related cost to the trading or logistics business unit
      that owns the partner relationship.
  - name: Optimization
    description: Consolidate redundant EDI feeds and prefer modern terminal-automation protocols
      where retiring legacy bridges reduces operational toil.
  - name: Accountability
    description: Designate a single integration owner per partner so EDI map maintenance and
      ticketing-bridge SLAs have a clear escalation path.
