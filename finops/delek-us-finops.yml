description: 'FOCUS-aligned FinOps for Delek US: Delek US is a downstream energy company without a
  public developer API. There is no API invoice line. Commercial relationships flow through
  product-supply, terminaling, and retail-fuel agreements rather than per-call billing.'
sources:
  - https://www.delekus.com
notes: No API consumption to meter. FinOps artifact retained for parity across providers; meters
  are illustrative of the bilateral-integration shape rather than a billable surface.
